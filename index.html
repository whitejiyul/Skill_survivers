    function createLaserBarrier(type, x, y, angleOffset) {
        if(type === 'grid') {
            for(let i=-3; i<=3; i++) {
                laserWarnings.push({x: x + i*150, y: 0, vx: 0, vy: 1, timer: 0, life: 2.2});
                laserWarnings.push({x: 0, y: y + i*150, vx: 1, vy: 0, timer: 0, life: 2.2});
            }
        } else if(type === 'fan') {
            for(let i=0; i<8; i++) {
                let a = angleOffset + (Math.PI*2/8)*i;
                laserWarnings.push({x: x, y: y, vx: Math.cos(a), vy: Math.sin(a), timer: 0, life: 2.2});
            }
        } else if(type === 'giant') {
            laserWarnings.push({x: player.x, y: 0, vx: 0, vy: 1, timer: 0, life: 3.0, isGiant: true});
        } else if(type === 'norman_snipe') {
            laserWarnings.push({x: x, y: y, vx: Math.cos(angleOffset), vy: Math.sin(angleOffset), timer: 0, life: (isHardMode?0.5:0.7), isGiant: true});
        }
    }

    function spawnBulletEnemy(x, y, angle, speed, color, radius, damage, props = {}) {
        // 발악 패턴 렉/프리징 완벽 차단. 최대 개수 초과시 오래된 투사체 삭제
        if (bullets.length > 800) {
            let oldestIdx = bullets.findIndex(b => !b.fromPlayer);
            if(oldestIdx !== -1) bullets.splice(oldestIdx, 1);
        }
        bullets.push({ x, y, radius, color, fromPlayer: false, damage, stationary: false, hitEnemies: [], velocity: { x: Math.cos(angle)*speed, y: Math.sin(angle)*speed }, bounceLeft: 0, ...props });
    }

    function spawnEnemy() {
        if (isGameOver || isPaused || isManualPaused || !gameActive) { setTimeout(spawnEnemy, 1000); return; }
        if (!bossSpawned) {
            let type = Math.random() > 0.6 ? 'ranged' : 'melee';
            if (gameTime >= 120 && Math.random() > 0.6) {
                let pool = ['tanker', 'dasher', 'phantom', 'tornado'];
                type = pool[Math.floor(Math.random() * pool.length)];
            }
            if (gameTime >= 270 && Math.random() > 0.7) {
                type = 'mutant';
            }
           
            let x = Math.random() < 0.5 ? -30 : canvas.width + 30; let y = Math.random() * canvas.height;
            let hp = 52, radius = 12, color = '#fff', baseScore = 50;
           
            if(type === 'melee') { hp = 75; radius = 15; color = '#2ecc71'; baseScore = 80; }
            else if(type === 'ranged') { hp = 52; radius = 12; color = '#9b59b6'; baseScore = 60; }
            else if(type === 'tanker') { hp = 350; radius = 25; color = '#27ae60'; baseScore = 150; }
            else if(type === 'dasher') { hp = 45; radius = 10; color = '#f1c40f'; baseScore = 70; }
            else if(type === 'phantom') { hp = 80; radius = 14; color = '#bdc3c7'; baseScore = 120; }
            else if(type === 'tornado') { hp = 150; radius = 18; color = '#7f8c8d'; baseScore = 150; }
            else if(type === 'mutant') { hp = 450; radius = 20; color = '#e67e22'; baseScore = 200; }
           
            hp *= difficultyLevel * (isHardMode ? 1.5 : 1);
            enemies.push({ x, y, radius, type, hp, maxHp: hp, color, timer: 0, hitFlash: 0, baseScore, targetedBy: 0 });
        }
       
        let spawnRate = Math.max(300, 1500 - (gameTime * 15));
        if (is2xSpeed && !bossSpawned) spawnRate /= 2;
        setTimeout(spawnEnemy, spawnRate);
    }

    function addScore(amount) {
        score += Math.floor(amount * 1.2);
        document.getElementById('score').innerText = score;
        checkLevelUp();
    }

    function update(timestamp) {
        if (isGameOver || !gameActive || isPaused || isManualPaused) return;
        let speedMult = (is2xSpeed && !bossSpawned) ? 2.0 : 1.0;
        const deltaTime = ((timestamp - lastTimestamp) / 1000) * speedMult;
        lastTimestamp = timestamp;

        enemies.forEach(e => e.targetedBy = 0);

        if (!bossSpawned) {
            gameTime += deltaTime;
            // 💡 시간에 비례해 적이 2^N배 강해짐 (극강의 스노우볼링)
            let minutes = Math.floor(gameTime / 60);
            difficultyLevel = (1 + (gameTime / 60) * 0.5) * Math.pow(2, minutes);
        }
        
        document.getElementById('timer').innerText = `${String(Math.floor(gameTime/60)).padStart(2,'0')}:${String(Math.floor(gameTime%60)).padStart(2,'0')}`;
       
        if (autoFire) { let t = getSmartNearestEnemy(player.x, player.y, [], true);
            if (t) playerFire(Math.atan2(t.y - player.y, t.x - player.x), true); }

        let pBulletsCount = bullets.filter(b => b.fromPlayer).length;
        let pDmgMultiplier = 1.0;
        const penaltyUi = document.getElementById('penalty-ui');
        if (pBulletsCount >= 100 && (player.skills.bounce || 0) < 7) {
            pDmgMultiplier = 1 / Math.pow(pBulletsCount / 100, 0.25);
            penaltyUi.innerText = `과부하 페널티! 대미지 ${(pDmgMultiplier*100).toFixed(0)}% (탄 ${pBulletsCount}개)`;
            penaltyUi.style.display = 'block';
        } else {
            penaltyUi.style.display = 'none';
        }

        let evRegen = player.skills.regen >= 5;
        if (player.skills.regen > 0 && player.hp < player.maxHp) {
            let regenAmt = player.skills.regen * 1.5;
            if (evRegen) {
                let missingHpRatio = 1 - (player.hp / player.maxHp);
                regenAmt = 5 + (missingHpRatio * 20);
            }
            player.hp = Math.min(player.maxHp, player.hp + (regenAmt * deltaTime));
            document.getElementById('hp').innerText = Math.ceil(player.hp);
        }
       
        if (dashCooldown > 0) {
            dashCooldown -= deltaTime;
            document.getElementById('dash-cool').innerText = `대시 충전 중 (${Math.ceil(dashCooldown)}s)`;
            document.getElementById('dash-cool').style.color = '#777';
        } else if (player.debuffs.extremeGravity <= 0) {
            document.getElementById('dash-cool').innerText = "대시 (Space)";
            document.getElementById('dash-cool').style.color = '#fff';
        } else {
            document.getElementById('dash-cool').innerText = "과중력 봉인됨";
            document.getElementById('dash-cool').style.color = '#e74c3c';
        }
       
        if (isDashing) {
            dashTime -= deltaTime;
            let evSpeed = player.skills.speed >= 5;
            if ((player.skills.dashBoost > 0 || evSpeed) && Math.random() < 0.4) {
                bullets.push({
                    x: player.x, y: player.y, radius: 10 + player.skills.size*2, color: evSpeed?'#9b59b6':'#e74c3c',
                    fromPlayer: true, damage: (15 + (player.skills.damage*2) + (player.skills.dashBoost*10)) * pDmgMultiplier,
                    velocity: {x:0, y:0}, stationary: true, spawnTime: Date.now(), bounceLeft: 0, pierceLeft: 999, hitEnemies: [], lifeTime: 1200
                });
            }
            if (dashTime <= 0) isDashing = false;
        }

        // 💡 광선검 버프 로직 (범위 2.5배 증가, 쿨타임 2배)
        if (player.skills.sword > 0) {
            player.swordTimer = (player.swordTimer || 0) + deltaTime;
            let swordCooldown = Math.max(0.5, (2.5 - (player.skills.firerate * 0.2) - (player.skills.sword * 0.2)) * 1.5);
            if (player.swordTimer >= swordCooldown) {
                player.swordTimer = 0;
                let sDamage = (150 + player.skills.damage * 40) * player.skills.sword * pDmgMultiplier;
                let sRange = (120 + player.skills.size * 20) * 2.5;
                if(player.skills.sword >= 5) { sDamage *= 2; sRange *= 1.5; }
                bullets.push({
                    x: player.x, y: player.y, radius: sRange, color: 'rgba(241, 196, 15, 0.4)', fromPlayer: true,
                    damage: sDamage, baseSpeed: 0, stationary: true, spawnTime: Date.now(), lifeTime: 300,
                    bounceLeft: 0, pierceLeft: 999, hitEnemies: [], isSword: true
                });
                playSound(300, 'sawtooth', 0.2, 0.1);
            }
        }
       
        // 💡 타즈메니아 펫: 이제 적에게 직접 돌진함
        if (player.skills.pet > 0) {
            let target = getSmartNearestEnemy(myPet.x, myPet.y);
            let petSpeed = (10 + player.skills.speed * 2) * (player.skills.pet >= 5 ? 2.5 : 1);
            if (target) {
                let ang = Math.atan2(target.y - myPet.y, target.x - myPet.x);
                myPet.x += Math.cos(ang) * petSpeed * speedMult;
                myPet.y += Math.sin(ang) * petSpeed * speedMult;
                if (Math.hypot(target.x - myPet.x, target.y - myPet.y) < 20 + target.radius) {
                    let petCooldown = Math.max(0.1, 0.8 - (player.skills.firerate * 0.08) - (player.skills.pet >= 5 ? 0.3 : 0));
                    if (myPet.timer > petCooldown) {
                        let petDmg = (50 + player.skills.damage * 25) * player.skills.pet * pDmgMultiplier;
                        if(player.skills.pet >= 5) petDmg *= 2;
                        target.hp -= petDmg;
                        target.hitFlash = 4;
                        createParticles(target.x, target.y, '#e67e22', 10);
                        if (target.hp <= 0 && !target.isSegment) handleEnemyDeath(target);
                        myPet.timer = 0;
                    }
                }
            } else {
                let px = player.x - 40 * player.lastDirX;
                let py = player.y - 40 * player.lastDirY;
                myPet.x += (px - myPet.x) * 0.05 * speedMult;
                myPet.y += (py - myPet.y) * 0.05 * speedMult;
            }
            myPet.timer += deltaTime;
        }

        let dbTxt = "";
        if (player.debuffs.distorted > 0) { player.debuffs.distorted -= deltaTime;
            dbTxt += "왜곡! (이속 감소)<br>"; }
        if (player.debuffs.extremeGravity > 0) { player.debuffs.extremeGravity -= deltaTime;
            dbTxt += "과중력! (대시 불가)<br>"; }
        document.getElementById('debuff-ui').innerHTML = dbTxt;
        document.getElementById('debuff-ui').style.display = dbTxt ? 'block' : 'none';

        let evSpeed = player.skills.speed >= 5;
        let basePace = 1.3;
        let currentSpeed = (4.5 + (player.skills.speed * 0.5)) * (isDashing ? 3 : 1) * basePace * (is2xSpeed && !bossSpawned ? 2.0 : 1.0);
        if (player.debuffs.distorted > 0) currentSpeed /= 1.5;
        if (player.iFrames > 0) player.iFrames -= deltaTime;

        let isMoving = keys.KeyW || keys.KeyS || keys.KeyA || keys.KeyD || joyX !== 0 || joyY !== 0;
        if (isMoving) {
            player.lastDirX = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0) + (joyX !== 0 ? joyX : 0);
            player.lastDirY = (keys.KeyS ? 1 : 0) - (keys.KeyW ? 1 : 0) + (joyY !== 0 ? joyY : 0);
            let mag = Math.hypot(player.lastDirX, player.lastDirY);
            if (mag > 0) { player.lastDirX /= mag; player.lastDirY /= mag; }
        }

        if (isDashing && !isMoving) { player.x += player.lastDirX * currentSpeed; player.y += player.lastDirY * currentSpeed; }
        else {
            if (keys.KeyW) player.y -= currentSpeed;
            if (keys.KeyS) player.y += currentSpeed;
            if (keys.KeyA) player.x -= currentSpeed; if (keys.KeyD) player.x += currentSpeed;
            if (joyX !== 0 || joyY !== 0) { player.x += joyX * currentSpeed; player.y += joyY * currentSpeed; }
        }
        player.x = Math.max(15, Math.min(canvas.width - 15, player.x));
        player.y = Math.max(15, Math.min(canvas.height - 15, player.y));

        if (player.skills.orbital > 0) {
            let evOrb = player.skills.orbital >= 5;
            let count = player.skills.orbital * (evOrb?2:1); let oRadius = 70 + (player.skills.size * 5); let oSpeed = gameTime * (evOrb?6:3);
            for(let i=0; i<count; i++) {
                let ox = player.x + Math.cos(oSpeed + (Math.PI*2/count)*i) * oRadius;
                let oy = player.y + Math.sin(oSpeed + (Math.PI*2/count)*i) * oRadius;
                enemies.forEach(e => {
                    if (Math.hypot(e.x - ox, e.y - oy) < 15 + e.radius && Date.now() - (e.lastOrbitalHit||0) > (evOrb?200:400)) {
                        let dmg = (15 + (player.skills.damage * 2)) * pDmgMultiplier;
                        if (Math.random() < player.skills.crit * 0.15) dmg *= 2;
                        e.hp -= dmg; e.hitFlash = 4; e.lastOrbitalHit = Date.now();
                        createParticles(e.x, e.y, '#f39c12', 5);
                        playSound(150, 'sawtooth', 0.05, 0.05);
                        if (e.hp <= 0 && !e.isSegment) handleEnemyDeath(e);
                    }
                });
            }
        }

        for(let i=laserWarnings.length-1; i>=0; i--) {
            let l = laserWarnings[i];
            l.timer += deltaTime;
            if (l.timer > 1.5 && l.timer < 1.6 && player.iFrames <= 0) {
                let nx = -l.vy, ny = l.vx;
                let dist = Math.abs((player.x - l.x)*nx + (player.y - l.y)*ny);
                if (dist < (l.isGiant ? 40 : 15)) {
                    player.hp -= (l.isGiant ? 50 : 25);
                    player.iFrames = 1.0;
                    playSound(200, 'sawtooth', 0.3, 0.3); shakeTime = 0.2; shakeMagnitude = 10;
                    document.getElementById('hp').innerText = Math.max(0, Math.ceil(player.hp));
                    if (player.hp <= 0) endGame();
                }
            }
            if (l.timer >= l.life) laserWarnings.splice(i, 1);
        }

        for(let i=particles.length-1; i>=0; i--) {
            let p = particles[i];
            p.x += p.vx; p.y += p.vy; p.life -= deltaTime * 1.5;
            if(p.life <= 0) particles.splice(i, 1);
        }
        
        if (shakeTime > 0) shakeTime -= deltaTime;
        
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            if (b.stationary) {
                let life = b.lifeTime || 1200;
                if (Date.now() - b.spawnTime > life) { bullets.splice(i, 1); continue; }
            }
            else { 
                b.x += b.velocity.x;
                b.y += b.velocity.y; 
            }
           
            if (b.fromPlayer && b.homingLvl > 0 && !b.stationary) {
                if (!b.currentTarget || b.currentTarget.dead) {
                    b.currentTarget = getSmartNearestEnemy(b.x, b.y, b.hitEnemies);
                    if (b.currentTarget) b.currentTarget.targetedBy++;
                }
               
                if (b.currentTarget) {
                    let baseAngle = Math.atan2(b.currentTarget.y - b.y, b.currentTarget.x - b.x);
                    baseAngle += Math.sin(gameTime * 5 + b.wobbleOffset) * 0.4;
                   
                    const turnRate = b.homingLvl >= 10 ? 0.4 : 0.05 * b.homingLvl;
                    b.velocity.x += Math.cos(baseAngle) * turnRate;
                    b.velocity.y += Math.sin(baseAngle) * turnRate;
                    const speed = Math.hypot(b.velocity.x, b.velocity.y);
                    b.velocity.x = (b.velocity.x / speed) * b.baseSpeed;
                    b.velocity.y = (b.velocity.y / speed) * b.baseSpeed;
                }
            }
           
            if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
                if (b.bounceLeft > 0) {
                    b.bounceLeft--;
                    b.x = Math.max(1, Math.min(canvas.width - 1, b.x)); b.y = Math.max(1, Math.min(canvas.height - 1, b.y));
                    let target = b.fromPlayer ? getSmartNearestEnemy(b.x, b.y, b.hitEnemies, true) : null;
                    if (target) { 
                        let ang = Math.atan2(target.y - b.y, target.x - b.x);
                        b.velocity.x = Math.cos(ang) * b.baseSpeed; b.velocity.y = Math.sin(ang) * b.baseSpeed;
                    }
                    else { 
                        if (b.x <= 1 || b.x >= canvas.width - 1) b.velocity.x *= -1;
                        if (b.y <= 1 || b.y >= canvas.height - 1) b.velocity.y *= -1;
                    }
                } else { bullets.splice(i, 1); continue; }
            } else if (!b.fromPlayer && (b.x < -100 || b.x > canvas.width+100 || b.y < -100 || b.y > canvas.height+100)) { 
                bullets.splice(i, 1); continue; 
            }
           
            if (!b.fromPlayer && player.iFrames <= 0 && Math.hypot(player.x - b.x, player.y - b.y) < player.hitbox + b.radius) {
                player.hp -= b.damage;
                player.iFrames = 0.8; document.getElementById('hp').innerText = Math.max(0, Math.ceil(player.hp));
                playSound(200, 'sawtooth', 0.3, 0.3); shakeTime = 0.1; shakeMagnitude = 5;
                if (!b.pierce) bullets.splice(i, 1); if (player.hp <= 0) endGame();
            }
        }

        for (let ei = enemies.length - 1; ei >= 0; ei--) {
            let e = enemies[ei];
            if (e.dead) { enemies.splice(ei, 1); continue; }

            const distToPlayer = Math.hypot(player.x - e.x, player.y - e.y);
            const angleToPlayer = Math.atan2(player.y - e.y, player.x - e.x);
           
            if (player.iFrames <= 0 && distToPlayer < player.hitbox + e.radius) {
                let evSpeedNerf = (evSpeed && !isDashing) ? 1.5 : 1;
                let touchDmg = e.type === 'dog' ? 90 : (e.type === 'calamitas' || e.type === 'tasmanian' || e.type === 'norman' ? 30 : 15);
                if (e.isSegment) touchDmg = 30;
                player.hp -= (touchDmg * evSpeedNerf); player.iFrames = 1.0;
                playSound(200, 'sawtooth', 0.3, 0.3); shakeTime = 0.2; shakeMagnitude = 8;
                document.getElementById('hp').innerText = Math.max(0, Math.ceil(player.hp));
                if (player.hp <= 0) endGame();
            }

            if (e.type === 'norman') {
                e.timer += deltaTime;
                if (e.state === 'hover') {
                    e.x += (canvas.width/2 - e.x) * 0.05;
                    e.y += (150 - e.y) * 0.05;
                    if (e.timer > (isHardMode ? 1.0 : 2.0)) { 
                        e.state = 'aiming'; e.timer = 0; e.laserAngle = angleToPlayer; playSound(600, 'sine', 1.0, 0.1);
                    }
                } else if (e.state === 'aiming') {
                    let diff = angleToPlayer - e.laserAngle;
                    e.laserAngle += diff * 0.06; 
                    if (e.timer > (isHardMode ? 0.8 : 1.2)) {
                        e.state = 'shoot'; e.timer = 0; shakeTime = 0.6; shakeMagnitude = 20;
                        playSound(150, 'square', 0.5, 0.5);
                        createLaserBarrier('norman_snipe', e.x, e.y, e.laserAngle);
                        if(isHardMode) {
                            createLaserBarrier('norman_snipe', e.x, e.y, e.laserAngle + 0.2);
                            createLaserBarrier('norman_snipe', e.x, e.y, e.laserAngle - 0.2);
                        }
                    }
                } else if (e.state === 'shoot') {
                    if (e.timer > 1) { 
                        e.state = 'hover'; e.timer = 0; 
                    }
                }
            } else if (e.type === 'dog') {
                e.timer += deltaTime;
                let hpPct = e.hp / e.maxHp;
                e.speedMult = 1.0;
                if (hpPct <= 0.92) e.speedMult += 0.2;
                if (hpPct <= 0.84) e.speedMult += 0.2;
                if (hpPct <= 0.76) e.speedMult += 0.2;
                if (hpPct <= 0.68) e.speedMult += 0.2;
                if (e.phase === 2) e.speedMult += 0.5;
                
                if (hpPct <= 0.6 && e.phase === 1) {
                    e.phase = 2; e.state = 'portal_in'; e.timer = 0; e.invincible = true;
                    showDialogue("신들의 포식자가 진정한 모습을 드러냅니다...", 4000);
                    bullets = bullets.filter(b => b.fromPlayer);
                }

                if (e.phase === 1) {
                    if (e.state === 'telegraph') {
                        e.invincible = true; e.dashAngle = angleToPlayer;
                        if (e.timer > 2.0) { 
                            e.state = 'blue'; e.timer = 0; e.invincible = false;
                        }
                    } else if (e.state === 'blue') {
                        player.debuffs.distorted = 0.5;
                        let tx = player.x, ty = player.y;
                        e.x += (tx - e.x) * 0.015 * e.speedMult;
                        e.y += (ty - e.y) * 0.015 * e.speedMult;
                        if (hpPct <= 0.75 && e.timer - e.attackTimer > 1.2) { 
                            spawnBulletEnemy(e.x, e.y, angleToPlayer, 8, '#3498db', 8, 20); e.attackTimer = e.timer; 
                        }
                        if (e.timer > 8) { 
                            e.state = 'magenta'; e.timer = 0; 
                        }
                    } else if (e.state === 'magenta') {
                        if (e.timer < 0.1) e.dashAngle = angleToPlayer;
                        e.x += Math.cos(e.dashAngle) * 12 * e.speedMult; e.y += Math.sin(e.dashAngle) * 12 * e.speedMult;
                        if (e.timer % 0.2 < 0.05) spawnBulletEnemy(e.x, e.y, Math.random() * Math.PI * 2, 6, '#e84393', 8, 20);
                        if (e.timer > 6) { 
                            e.state = 'purple'; e.timer = 0; e.attackTimer = 0;
                        }
                    } else if (e.state === 'purple') {
                        e.x += Math.cos(e.timer*2) * 5 * e.speedMult;
                        e.y += Math.sin(e.timer*2) * 5 * e.speedMult;
                        if (e.timer - e.attackTimer > 2.5) { 
                            createLaserBarrier(Math.random() > 0.5 ? 'grid' : 'fan', e.x, e.y, angleToPlayer); e.attackTimer = e.timer; 
                        }
                        if (e.timer > 8) { 
                            e.state = 'blue'; e.timer = 0; 
                        }
                    }
                } else if (e.phase === 2) {
                    if (e.state === 'portal_in') {
                        e.radius -= deltaTime * 15;
                        if (e.radius <= 0) { 
                            e.radius = 0; 
                            if(e.timer > 2) { 
                                e.state = 'portal_out'; e.x = Math.random()*canvas.width; e.y = -100; 
                                if(e.history) e.history.forEach(h => {h.x=e.x; h.y=e.y;}); 
                            } 
                        }
                    } else if (e.state === 'portal_out') {
                        e.radius += deltaTime * 15;
                        if (e.radius >= 40) { 
                            e.radius = 40; e.state = 'purple_enhanced'; e.timer = 0; e.invincible = false;
                        }
                    } else if (e.state === 'purple_enhanced') {
                        e.x += (canvas.width/2 - e.x) * 0.05;
                        e.y += (canvas.height/2 - e.y) * 0.05;
                        if (e.timer > 1 && e.timer < 1.1 && !e.l1) { 
                            createLaserBarrier('grid', canvas.width/2, canvas.height/2, 0); e.l1 = true; 
                        }
                        if (e.timer > 3 && e.timer < 3.1 && !e.l2) { 
                            createLaserBarrier('fan', canvas.width/2, canvas.height/2, Math.PI/4); e.l2 = true; 
                        }
                        if (e.timer > 5 && e.timer < 5.1 && !e.l3) { 
                            createLaserBarrier('grid', player.x, player.y, 0); e.l3 = true; 
                        }
                        if (hpPct <= 0.25 && e.timer > 7 && e.timer < 7.1 && !e.l4) { 
                            createLaserBarrier('giant', player.x, player.y, 0); e.l4 = true; 
                        }
                        if (isHardMode && e.timer > 8 && e.timer < 8.1 && !e.l5) { 
                            createLaserBarrier('fan', player.x, player.y, 0); e.l5 = true; 
                        }
                        if (e.timer > 9) { 
                            e.state = hpPct <= 0.25 ? 'teleport_dash' : 'magenta'; 
                            e.timer = 0; e.l1=false; e.l2=false; e.l3=false; e.l4=false; e.l5=false; e.teleportStep = 0;
                        }
                    } else if (e.state === 'teleport_dash') {
                        if (e.timer % 2 < 0.5) { 
                            e.invincible = true;
                            e.x = player.x + (Math.random()-0.5)*800; e.y = player.y + (Math.random()-0.5)*800; 
                            if(e.history) e.history.forEach(h => {h.x=e.x; h.y=e.y;});
                        }
                        else if (e.timer % 2 < 0.6) { 
                            e.invincible = false; e.dashAngle = angleToPlayer; 
                        }
                        else if (e.timer % 2 < 1.5) {
                            e.x += Math.cos(e.dashAngle)*20;
                            e.y += Math.sin(e.dashAngle)*20;
                            if (e.timer % 0.1 < 0.05) spawnBulletEnemy(e.x, e.y, Math.random()*Math.PI*2, 6, '#3498db', 8, 20);
                        }
                        if (e.timer > 2) { 
                            e.timer = 0; e.teleportStep++; if(e.teleportStep >= 3) e.state = 'purple_enhanced'; 
                        }
                    } else if (e.state === 'magenta') {
                        if (e.timer < 0.1) e.dashAngle = angleToPlayer;
                        e.x += Math.cos(e.dashAngle) * 15; e.y += Math.sin(e.dashAngle) * 15;
                        if (e.timer % 0.15 < 0.05) {
                            for(let i=0; i<3; i++) spawnBulletEnemy(e.x, e.y, e.dashAngle + (Math.PI/2) + (i*0.5), 7, '#e84393', 8, 20);
                            for(let i=0; i<3; i++) spawnBulletEnemy(e.x, e.y, e.dashAngle - (Math.PI/2) - (i*0.5), 7, '#e84393', 8, 20);
                        }
                        if(e.timer > 5) { 
                            e.state = 'purple_enhanced'; e.timer = 0; 
                        }
                    }
                }
               
                if (e.history) { 
                    e.history.unshift({x: e.x, y: e.y, state: e.state});
                    if (e.history.length > e.segments * 10) e.history.pop(); 
                }
            }
            else if (e.type === 'calamitas') {
                let hpPct = e.hp / e.maxHp;
                e.timer += deltaTime; e.angleOffset += deltaTime;
               
                if (hpPct <= 0.6 && !e.flags.bros) {
                    e.flags.bros = true;
                    showDialogue("일어나라 형제들이여!", 3000);
                    let bHp = 3600 * difficultyLevel;
                    let leftX = Math.max(50, Math.min(canvas.width - 50, e.x - 150));
                    let rightX = Math.max(50, Math.min(canvas.width - 50, e.x + 150));
                    enemies.push({ x: leftX, y: Math.max(50, Math.min(canvas.height - 50, e.y)), radius: 35, type: 'cataclysm', hp: bHp, maxHp: bHp, color: '#e67e22', timer: 0, hitFlash: 0, angleOffset: 0 });
                    enemies.push({ x: rightX, y: Math.max(50, Math.min(canvas.height - 50, e.y)), radius: 35, type: 'catastrophe', hp: bHp, maxHp: bHp, color: '#d35400', timer: 0, hitFlash: 0, angleOffset: Math.PI });
                }

                if (hpPct <= 0.7 && !e.flags.bh1) { 
                    e.flags.bh1 = true; e.state = 'bullet_hell_1'; e.timer = 0; bullets = bullets.filter(b => b.fromPlayer); showDialogue("탄막 지옥 전개!", 2000);
                }
                if (hpPct <= 0.1 && !e.flags.bh2) { 
                    e.flags.bh2 = true; e.state = 'bullet_hell_2'; e.timer = 0; bullets = bullets.filter(b => b.fromPlayer); showDialogue("최후의 발악!", 2000);
                }
               
                if (e.state === 'phase1_hover') {
                    let tx = player.x + Math.cos(e.angleOffset)*300;
                    let ty = player.y - 250; e.x += (tx - e.x) * 0.05; e.y += (ty - e.y) * 0.05;
                    if (e.timer > 2.0) {
                        for(let i = (isHardMode?-2:-1); i <= (isHardMode?2:1); i++) spawnBulletEnemy(e.x, e.y, angleToPlayer + i*0.5, 7.5, '#c0392b', 12, 20, {bounceLeft: 2});
                        e.timer = 0;
                    }
                } else if (e.state === 'bullet_hell_1') {
                    e.invincible = true;
                    e.x += (canvas.width/2 - e.x) * 0.05; e.y += (canvas.height/2 - e.y) * 0.05;
                    if (e.timer % 0.2 < 0.05) for(let i=0; i<4; i++) spawnBulletEnemy(e.x, e.y, e.angleOffset * 4 + (Math.PI/2)*i, 6, '#e74c3c', 6, 15, {bounceLeft: 1});
                    if (e.timer > 10) { 
                        e.state = 'phase1_hover'; e.timer = 0; e.invincible = false;
                    }
                } else if (e.state === 'bullet_hell_2') {
                    e.x += (canvas.width/2 - e.x) * 0.05;
                    e.y += (canvas.height/2 - e.y) * 0.05;
                    if (e.timer - (e.lastBhShot2 || 0) > 0.15) {
                        for(let i=0; i<6; i++) spawnBulletEnemy(e.x, e.y, -e.angleOffset * 5 + (Math.PI/3)*i, 7, '#8e44ad', 7, 20, {bounceLeft: 1});
                        e.lastBhShot2 = e.timer;
                    }
                    if (e.timer > 15) { 
                        e.state = 'phase1_hover'; e.timer = 0; e.lastBhShot2 = 0; 
                    }
                }
            }
            else if (e.type === 'brother') {
                let cal = enemies.find(en => en.type === 'calamitas' && !en.dead);
                if (cal) {
                    e.timer += deltaTime;
                    e.angleOffset += deltaTime * 0.5;
                    let targetX = player.x + Math.cos(e.angleOffset) * 200;
                    let targetY = player.y + Math.sin(e.angleOffset) * 200;
                    e.x += (targetX - e.x) * 0.02;
                    e.y += (targetY - e.y) * 0.02;
                    if (e.timer > 2.5) { 
                        spawnBulletEnemy(e.x, e.y, angleToPlayer, 5, e.color, 8, 15, {bounceLeft: 1}); e.timer = 0; 
                    }
                } else { 
                    e.hp -= 9999;
                }
            }
            else if (e.type === 'tasmanian') {
                e.timer += deltaTime;
                if (e.state === 'roar') {
                    e.x += (canvas.width/2 - e.x) * 0.05;
                    e.y += (canvas.height/2 - e.y) * 0.05;
                    if (e.timer > 3) { 
                        e.state = 'chase'; e.timer = 0;
                    }
                } else if (e.state === 'chase') {
                    e.x += Math.cos(angleToPlayer) * 3.5;
                    e.y += Math.sin(angleToPlayer) * 3.5;
                    if (e.timer > 2) {
                        for(let i=0; i<(isHardMode?24:18); i++) spawnBulletEnemy(e.x, e.y, (Math.PI*2/(isHardMode?24:18))*i, 6, '#cd853f', 12, 35);
                        e.timer = 0;
                        if (Math.random() < 0.3) { 
                            e.state = 'jump'; e.timer = 0; e.dashAngle = angleToPlayer; e.invincible = true;
                        }
                    }
                } else if (e.state === 'jump') {
                    e.x += Math.cos(e.dashAngle) * 25;
                    e.y += Math.sin(e.dashAngle) * 25;
                    if (e.timer > 1) { 
                        e.state = 'chase'; e.timer = 0; e.invincible = false;
                    }
                }
            }
            else {
                if (e.type === 'melee') { 
                    e.x += Math.cos(angleToPlayer) * 2.5;
                    e.y += Math.sin(angleToPlayer) * 2.5; 
                }
                else if (e.type === 'ranged') {
                    e.timer += deltaTime;
                    if (distToPlayer > 300) { 
                        e.x += Math.cos(angleToPlayer)*1.5; e.y += Math.sin(angleToPlayer)*1.5;
                    }
                    if (e.timer > 3.0) { 
                        spawnBulletEnemy(e.x, e.y, angleToPlayer, 3.5, '#9b59b6', 5, 10); e.timer = 0; 
                    }
                }
                else if (e.type === 'tanker') { 
                    e.x += Math.cos(angleToPlayer) * 0.8;
                    e.y += Math.sin(angleToPlayer) * 0.8; 
                }
                else if (e.type === 'dasher') {
                    e.timer += deltaTime;
                    let speed = (e.timer % 3 < 0.5) ? 8 : 1.2;
                    e.x += Math.cos(angleToPlayer) * speed;
                    e.y += Math.sin(angleToPlayer) * speed;
                }
                else if (e.type === 'phantom') {
                    e.timer += deltaTime;
                    e.x += Math.cos(angleToPlayer) * 2.2; e.y += Math.sin(angleToPlayer) * 2.2;
                }
                else if (e.type === 'tornado') {
                    e.timer += deltaTime;
                    if (distToPlayer > 250) { 
                        e.x += Math.cos(angleToPlayer)*1.2; e.y += Math.sin(angleToPlayer)*1.2;
                    }
                    if (e.timer > 1.5) {
                        for(let i=0; i<4; i++) spawnBulletEnemy(e.x, e.y, e.timer*3 + (Math.PI/2)*i, 4, '#7f8c8d', 6, 15);
                        e.timer = 0;
                    }
                }
                else if (e.type === 'mutant') {
                    e.timer += deltaTime;
                    e.x += Math.cos(angleToPlayer) * 1.8; e.y += Math.sin(angleToPlayer) * 1.8;
                    if (e.timer > 2.5) {
                        for(let i=0; i<3; i++) spawnBulletEnemy(e.x, e.y, angleToPlayer + (i-1)*0.2, 5, '#e67e22', 8, 20);
                        e.timer = 0;
                    }
                }
            }

            for (let bi = bullets.length - 1; bi >= 0; bi--) {
                let b = bullets[bi];
                if (b.stationary && b.hitEnemies && b.hitEnemies.includes(e)) continue;

                if (b.fromPlayer && !b.hitEnemies.includes(e) && Math.hypot(e.x - b.x, e.y - b.y) < e.radius + b.radius) {
                    if (!((e.type === 'calamitas'||e.type === 'dog' || e.type === 'tasmanian' || e.type === 'norman') && e.invincible)) {
                        let dmg = b.damage * pDmgMultiplier;
                        if (Math.random() < b.critChance) {
                            if (player.skills.crit >= 5 && Math.random() < 0.05) {
                                dmg *= 50;
                                e.hitFlash = 10;
                            } else {
                                dmg *= (b.isEvolvedDmg ? 5 : 2);
                            }
                        }
                       
                        e.hp -= dmg;
                        if(e.hitFlash < 4) e.hitFlash = 4;
                        createParticles(e.x, e.y, e.color, 5);
                        playSound(150, 'sawtooth', 0.05, 0.05);
                        if (e.hp <= 0 && !e.isSegment) handleEnemyDeath(e);
                    }
                   
                    b.hitEnemies.push(e);
                    if (b.stationary) { 
                        setTimeout(() => { let idx = b.hitEnemies.indexOf(e); if(idx>-1) b.hitEnemies.splice(idx, 1); }, 500);
                    }
                    else if (b.bounceLeft > 0) {
                        b.bounceLeft--;
                        let nextTarget = getSmartNearestEnemy(b.x, b.y, b.hitEnemies, true);
                        if (nextTarget) { 
                            let bounceAngle = Math.atan2(nextTarget.y - b.y, nextTarget.x - b.x);
                            b.velocity.x = Math.cos(bounceAngle) * b.baseSpeed; b.velocity.y = Math.sin(bounceAngle) * b.baseSpeed;
                        }
                        else bullets.splice(bi, 1);
                    } else if (b.pierceLeft > 0) b.pierceLeft--; else bullets.splice(bi, 1);
                    break;
                }
            }
        }
        draw();
        requestAnimationFrame(update);
    }

    function handleEnemyDeath(e) {
        let pts = e.baseScore || 50;
        if (e.type === 'dog') pts = 25000;
        else if (e.type === 'calamitas') pts = 15000;
        else if (e.type === 'tasmanian') pts = 30000;
        else if (e.type === 'norman') pts = 45000;
        else if (e.type === 'brother') pts = 1000;
       
        addScore(pts);
        e.dead = true;
        createParticles(e.x, e.y, e.color, 30);
        playSound(100, 'square', 0.2, 0.1);
        if (e.type === 'calamitas'||e.type === 'dog'||e.type === 'tasmanian'||e.type === 'norman') {
            bossSpawned = false;
            document.getElementById('timer-box').classList.remove('boss-timer');
            showDialogue("보스를 파괴했습니다!", 5000); bullets = bullets.filter(bull => bull.fromPlayer); laserWarnings = [];
            shakeTime = 1.0; shakeMagnitude = 20;
            createParticles(e.x, e.y, e.color, 150);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (shakeTime > 0) {
            ctx.save();
            ctx.translate((Math.random()-0.5)*shakeMagnitude, (Math.random()-0.5)*shakeMagnitude);
        }

        ctx.fillStyle = '#ffffff';
        stars.forEach(star => {
            if (!isPaused && !isManualPaused) star.y += star.speed * (is2xSpeed ? 2 : 1);
            if (star.y > canvas.height) { star.y = 0; star.x = Math.random() * canvas.width; }
            ctx.globalAlpha = Math.random() > 0.95 ? 0.5 : 1.0;
            ctx.beginPath(); ctx.arc(star.x, star.y, star.s, 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        laserWarnings.forEach(l => {
            ctx.save(); ctx.strokeStyle = l.isGiant ? '#8e44ad' : '#e74c3c';
            if (l.timer < 1.5) { ctx.lineWidth = l.isGiant ? 10 : 2; ctx.globalAlpha = 0.3 + (l.timer/3); }
            else { ctx.lineWidth = l.isGiant ? 80 : 30; ctx.globalAlpha = 1.0; ctx.shadowBlur = 20; ctx.shadowColor = l.isGiant ? '#8e44ad' : '#e74c3c'; }
           
            ctx.beginPath();
            if (l.vx === 0 && l.vy === 1) { ctx.moveTo(l.x, -100); ctx.lineTo(l.x, canvas.height+100); }
            else if (l.vx === 1 && l.vy === 0) { ctx.moveTo(-100, l.y); ctx.lineTo(canvas.width+100, l.y); }
            else { ctx.moveTo(l.x, l.y); ctx.lineTo(l.x + l.vx*2000, l.y + l.vy*2000); }
           
            ctx.stroke(); ctx.restore();
        });
        
        if (player.skills.pet > 0 && myPet) {
            ctx.save();
            ctx.translate(myPet.x, myPet.y);
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI*2); ctx.fillStyle = '#cd853f'; ctx.fill();
            ctx.fillStyle = '#111'; ctx.beginPath();
            ctx.arc(-5, -3, 3, 0, Math.PI*2); ctx.arc(5, -3, 3, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }

        if (player.skills.orbital > 0) {
            let evOrb = player.skills.orbital >= 5;
            let count = player.skills.orbital * (evOrb?2:1); let oRadius = 70 + (player.skills.size * 5); let oSpeed = gameTime * (evOrb?6:3);
            for(let i=0; i<count; i++) {
                let ox = player.x + Math.cos(oSpeed + (Math.PI*2/count)*i) * oRadius;
                let oy = player.y + Math.sin(oSpeed + (Math.PI*2/count)*i) * oRadius;
                ctx.beginPath(); ctx.arc(ox, oy, 12, 0, Math.PI*2); ctx.fillStyle = evOrb ?
                '#9b59b6' : '#f39c12'; ctx.fill();
            }
        }

        bullets.forEach(b => {
            if (b.isSword) {
                ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(gameTime * 15);
                ctx.fillStyle = b.color; ctx.beginPath(); ctx.moveTo(0,0); ctx.arc(0,0, b.radius, -Math.PI/2, Math.PI/2); ctx.fill();
                ctx.restore();
            } else {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius * 1.5, 0, Math.PI*2);
                ctx.fillStyle = b.fromPlayer ? 'rgba(52, 152, 219, 0.4)' : 'rgba(231, 76, 60, 0.4)';
                if(b.stationary) ctx.fillStyle = b.color === '#9b59b6' ? 'rgba(155, 89, 182, 0.6)' : 'rgba(231, 76, 60, 0.6)';
                ctx.fill();
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fillStyle = b.color; ctx.fill();
               
                if (!b.fromPlayer) {
                    ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
                }
            }
        });
        
        particles.forEach(p => {
            ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fillStyle = p.color; ctx.fill();
        });
        ctx.globalAlpha = 1.0;

        if (player.iFrames <= 0 || Math.floor(Date.now() / 100) % 2 === 0) {
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
            ctx.fillStyle = isDashing ? '#f1c40f' : player.color; ctx.fill();
            ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
            ctx.beginPath(); ctx.arc(player.x, player.y, player.hitbox, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fill();
        }

        let dog = enemies.find(e => e.type === 'dog');
        if (dog && dog.radius > 0 && dog.history && dog.history.length > 0) {
            if (dog.state === 'telegraph') {
                ctx.save();
                ctx.beginPath(); ctx.moveTo(dog.x, dog.y);
                ctx.lineTo(dog.x + Math.cos(dog.dashAngle)*2000, dog.y + Math.sin(dog.dashAngle)*2000);
                ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)'; ctx.lineWidth = 4; ctx.setLineDash([15, 15]);
                ctx.stroke(); ctx.restore();
            }
            for (let i = dog.segments; i >= 1; i--) {
                let pos = dog.history[i * 10];
                if (pos) {
                    ctx.save();
                    ctx.shadowBlur = 10;
                    ctx.beginPath(); ctx.arc(pos.x, pos.y, dog.radius * 0.8, 0, Math.PI*2);
                    let color = '#00ffff'; if(dog.state==='magenta'||pos.state==='magenta') color = '#e84393';
                    else if(dog.state.includes('purple')||pos.state.includes('purple')) color = '#8e44ad';
                    ctx.shadowColor = color; ctx.fillStyle = dog.hitFlash > 0 ? '#fff' : color; ctx.fill();
                    ctx.strokeStyle = '#2d3436'; ctx.lineWidth = 4; ctx.stroke(); ctx.restore();
                }
            }
        }

        enemies.forEach(e => {
            if (e.dead || e.isSegment) return;
           
            if (e.x < -e.radius || e.x > canvas.width + e.radius || e.y < -e.radius || e.y > canvas.height + e.radius) {
                let edgeX = Math.max(15, Math.min(canvas.width - 15, e.x));
                let edgeY = Math.max(15, Math.min(canvas.height - 15, e.y));
                ctx.beginPath(); ctx.arc(edgeX, edgeY, e.radius * 0.7, 0, Math.PI*2);
                ctx.fillStyle = e.color; ctx.globalAlpha = 0.4; ctx.fill(); ctx.globalAlpha = 1.0;
            }

            if (e.type === 'phantom') ctx.globalAlpha = 0.2 + 0.6 * Math.abs(Math.sin(e.timer * 3));

            if (e.type === 'calamitas') {
                ctx.save(); ctx.translate(e.x, e.y); ctx.shadowBlur = 20; ctx.shadowColor = '#e74c3c';
               
                let pulse = Math.sin(Date.now()/150) * 8; let grad = ctx.createRadialGradient(0,0, e.radius*0.3, 0,0, e.radius*1.8 + pulse);
                grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, '#f1c40f'); grad.addColorStop(0.6, '#e74c3c');
                grad.addColorStop(1, 'transparent');
                ctx.beginPath(); ctx.arc(0, 0, e.radius*1.8 + pulse, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
               
                ctx.rotate(gameTime * 3);
                ctx.fillStyle = (e.hitFlash > 0) ? '#ffffff' : '#8e0000';
                for(let i=0; i<6; i++) { ctx.beginPath(); ctx.moveTo(e.radius*0.6, 0); ctx.lineTo(e.radius*1.3, -12);
                ctx.lineTo(e.radius*1.3, 12); ctx.fill(); ctx.rotate(Math.PI / 3); }
               
                ctx.beginPath();
                ctx.arc(0, 0, e.radius * 0.7, 0, Math.PI*2); ctx.fillStyle = '#111'; ctx.fill();
                ctx.lineWidth = 3; ctx.strokeStyle = '#e74c3c'; ctx.stroke();
                ctx.restore();
            } else if (e.type === 'tasmanian') {
                ctx.save();
                ctx.translate(e.x, e.y); ctx.shadowBlur = 15; ctx.shadowColor = '#cd853f';
                ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI*2); ctx.fillStyle = e.hitFlash > 0 ?
                '#fff' : '#cd853f'; ctx.fill();
                ctx.fillStyle = '#8b4513'; ctx.beginPath(); ctx.arc(-15, -15, 8, 0, Math.PI*2); ctx.arc(15, -15, 8, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-15, -15, 4, 0, Math.PI*2); ctx.arc(15, -15, 4, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.beginPath();
                ctx.moveTo(-20, 10); ctx.lineTo(20, 10); ctx.lineTo(0, 25); ctx.fill();
                ctx.restore();
            } else if (e.type === 'norman') {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.shadowBlur = 10; ctx.shadowColor = '#fff';
                ctx.fillStyle = e.hitFlash > 0 ? '#fff' : '#111';
                ctx.fillRect(-e.radius, -e.radius*0.8, e.radius*2, e.radius*1.6);
                ctx.strokeStyle = '#3498db'; ctx.lineWidth = 4; ctx.strokeRect(-e.radius, -e.radius*0.8, e.radius*2, e.radius*1.6);
                ctx.fillStyle = e.state === 'aiming' ?
                '#e74c3c' : (e.state === 'shoot' ? '#fff' : '#3498db');
                ctx.fillRect(-e.radius*0.8, -e.radius*0.6, e.radius*1.6, e.radius*1.2);
                if(e.state === 'aiming') { ctx.rotate(e.laserAngle); ctx.strokeStyle='rgba(255,0,0,0.5)'; ctx.beginPath();
                ctx.moveTo(0,0); ctx.lineTo(2000,0); ctx.stroke(); }
                ctx.restore();
            } else if (e.type === 'dog' && e.radius > 0 && e.history && e.history.length > 0) {
                ctx.save();
                ctx.translate(e.x, e.y);
                let color = '#00ffff'; if(e.state==='magenta') color = '#e84393'; else if(e.state.includes('purple')) color = '#8e44ad';
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI*2); ctx.fillStyle = e.hitFlash > 0 ? '#fff' : color; ctx.fill();
                let angle = e.history[1] ? Math.atan2(e.y - e.history[1].y, e.x - e.history[1].x) : 0;
                ctx.rotate(angle);
                ctx.fillStyle = '#000'; ctx.beginPath();
                ctx.arc(e.radius*0.4, -e.radius*0.4, e.radius*0.2, 0, Math.PI*2); ctx.arc(e.radius*0.4, e.radius*0.4, e.radius*0.2, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(e.radius*0.5, -e.radius*0.4, e.radius*0.05, 0, Math.PI*2);
                ctx.arc(e.radius*0.5, e.radius*0.4, e.radius*0.05, 0, Math.PI*2); ctx.fill();
               
                ctx.fillStyle = '#2d3436'; ctx.beginPath(); ctx.moveTo(e.radius, -e.radius*0.6); ctx.lineTo(e.radius*1.5, -e.radius*0.2); ctx.lineTo(e.radius, 0); ctx.fill();
                ctx.beginPath(); ctx.moveTo(e.radius, e.radius*0.6);
                ctx.lineTo(e.radius*1.5, e.radius*0.2); ctx.lineTo(e.radius, 0); ctx.fill();
                ctx.restore();
            } else if (e.type !== 'dog') {
                ctx.fillStyle = (e.hitFlash > 0) ?
                '#ffffff' : e.color; if (e.hitFlash > 0) e.hitFlash--;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();
            }
           
            ctx.globalAlpha = 1.0;
            if ((e.type === 'calamitas' || e.type === 'dog' || e.type === 'tasmanian' || e.type === 'norman') && e.invincible && e.radius > 0) {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius + 20 + Math.sin(Date.now()/150)*5, 0, Math.PI*2);
                ctx.strokeStyle = 'rgba(241, 196, 15, 0.6)'; ctx.lineWidth = 4; ctx.stroke();
            }
            if (e.type !== 'calamitas' && e.type !== 'dog' && e.type !== 'tasmanian' && e.type !== 'norman') { ctx.fillStyle = 'red';
                ctx.fillRect(e.x - e.radius, e.y - e.radius - 12, (e.radius*2) * (e.hp/e.maxHp), 4);
            }
        });

        let boss = enemies.find(e => (e.type === 'calamitas' || e.type === 'dog' || e.type === 'tasmanian' || e.type === 'norman') && !e.dead);
        if (boss) {
            const barW = 800;
            const barH = 20; const bx = canvas.width / 2 - barW / 2; const by = 60;
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(bx, by, barW, barH);
            let bColor = '#c0392b';
            if(boss.type === 'dog') { bColor = boss.state === 'magenta' ? '#e84393' : (boss.state.includes('purple') ? '#8e44ad' : '#00ffff');
            }
            else if(boss.type === 'tasmanian') { bColor = '#cd853f';
            }
            else if(boss.type === 'norman') { bColor = '#fff';
            }
            ctx.fillStyle = bColor;
            ctx.fillRect(bx, by, barW * Math.max(0, boss.hp / boss.maxHp), barH);
            ctx.strokeStyle = '#f1c40f'; ctx.lineWidth = 2; ctx.strokeRect(bx, by, barW, barH);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Malgun Gothic'; ctx.textAlign = 'center';
            let bName = boss.type === 'dog' ?
            (boss.phase===2 ? '신들의 포식자 (진정한 모습)' : '신들의 포식자') : (boss.type === 'tasmanian' ? '타즈메니아 주머니 늑대' : (boss.type === 'norman' ? '노맨 저격수 TV' : '클론 칼라미타스'));
            ctx.fillText(`${bName} - ${(Math.max(0, boss.hp/boss.maxHp)*100).toFixed(1)}%`, canvas.width/2, by + 15);
        }

        if (shakeTime > 0) ctx.restore();
    }

    function endGame() {
        if (isGameOver) return;
        if (isReviveMode && revivesLeft > 0) {
            revivesLeft--;
            player.hp = player.maxHp; player.iFrames = 3.0;
            document.getElementById('hp').innerText = player.hp;
            showDialogue("불굴의 의지로 부활했습니다!", 3000); return;
        }
        isGameOver = true;
        localStorage.removeItem('skillSurvivorSave_' + currentUser);
        setTimeout(()=> {
            const lb = JSON.parse(localStorage.getItem('skillSurvivorLB_V3')) || [];
            lb.push({ name: currentUser, score: score });
            lb.sort((a, b) => b.score - a.score);
            lb.splice(5);
           
            localStorage.setItem('skillSurvivorLB_V3', JSON.stringify(lb));
            
            alert(`GAME OVER! 최종 점수: ${score}`);
            location.reload();
        }, 100);
    }
</script>
